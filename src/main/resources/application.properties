token.duration=24h
token.issuer=PriceMonitoring

spring.rabbitmq.publisher-confirm-type=none
spring.rabbitmq.template.reply-timeout=10s

scrapping.response.queue.name=scrapper-tasks-results

spring.rabbitmq.cache.channel.size=200
spring.rabbitmq.listener.simple.prefetch=20
spring.rabbitmq.listener.simple.acknowledge-mode=auto
spring.rabbitmq.listener.simple.concurrency=4

spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.url=${SPRING_DATASOURCE_URL}


spring.rabbitmq.host=${SPRING_RABBITMQ_HOST}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT}
spring.rabbitmq.virtual-host=vhost
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD}



scrapping.server.address=${SCRAPPING_SERVER_ADDRESS}
scrapping.server.port=${SCRAPPING_SERVER_PORT}

management.endpoints.enabled-by-default=false
management.endpoint.prometheus.enabled=true
management.endpoint.health.enabled=true
management.endpoints.web.exposure.include=prometheus,health

spring.datasource.hikari.data-source-properties.applicationName=BackEnd

spring.liquibase.change-log=classpath*:liquibase/root-changelog.xml
spring.liquibase.contexts=data

logging.level.org.hibernate.engine.jdbc.spi.SqlExceptionHelper=off

