#rate limiting
rate.limit.email.capacity=1
rate.limit.email.refillStrategy=INTERVAL
rate.limit.email.refillTokens=1
rate.limit.email.refillPeriod=1d

rate.limit.password.capacity=1
rate.limit.password.refillStrategy=INTERVAL
rate.limit.password.refillTokens=1
rate.limit.password.refillPeriod=1d

rate.limit.api.capacity=5
rate.limit.api.refillStrategy=GREEDY
rate.limit.api.refillTokens=5
rate.limit.api.refillPeriod=1s

