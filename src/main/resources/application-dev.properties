spring.datasource.username=root
spring.datasource.password=root
spring.datasource.url=jdbc:mysql://localhost:13306/price_monitoring
debug=true

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.virtual-host=vhost
spring.rabbitmq.username=price_monitoring
spring.rabbitmq.password=price_monitoring

scrapping.server.address=http://localhost
scrapping.server.port=3001
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.type=trace
logging.level.org.hibernate.orm.jdbc.bind=trace

# In local dev we don't need heavy seed CSV loads (those are context="data")
spring.liquibase.contexts=dev

# Make local dev testing easier (avoid 1 email/day limit)
rate.limit.email.capacity=50
rate.limit.email.refillStrategy=GREEDY
rate.limit.email.refillTokens=50
rate.limit.email.refillPeriod=1m

rate.limit.password.capacity=50
rate.limit.password.refillStrategy=GREEDY
rate.limit.password.refillTokens=50
rate.limit.password.refillPeriod=1m

rate.limit.api.capacity=100
rate.limit.api.refillStrategy=GREEDY
rate.limit.api.refillTokens=100
rate.limit.api.refillPeriod=1s